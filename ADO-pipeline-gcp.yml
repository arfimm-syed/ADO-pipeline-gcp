

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Validate
  jobs:
  - job: Validate
    steps:
    - checkout: self

    - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
      inputs:
        terraformVersion: '1.14.6'

    - task: Bash@3
      inputs:
        targetType: inline
        script: |
          pwd 
          ls -ltr
          python3 -m pip install --upgrade pip
          pip3 install checkov
      displayName: 'Installing Checkov'

    - task: Bash@3
      inputs:
        targetType: inline
        script: |
          checkov -d terraform
      displayName: 'Security Scan'

- stage: Plan
  dependsOn: Validate
  jobs:
  - job: Plan
    steps:

    - checkout: self
      
    - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
      inputs:
        terraformVersion: '1.14.6'

    - task: DownloadSecureFile@1
      name: gcpcred
      inputs:
        secureFile: gcp-wif.json
    
    - bash: |
        echo "Requesting Azure DevOps OIDC token..."

        curl -H "Authorization: Bearer $SYSTEM_ACCESSTOKEN" \
        "$SYSTEM_OIDCTOKENURI" \
        | jq -r '.value' > /tmp/oidc-token

        export GOOGLE_APPLICATION_CREDENTIALS=$(gcpcred.secureFilePath)

        gcloud auth login --cred-file=$GOOGLE_APPLICATION_CREDENTIALS

        gcloud auth list
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      displayName: Authenticate to GCP


