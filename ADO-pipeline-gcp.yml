

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Validate
  jobs:
  - job: Validate
    steps:
    - checkout: self

    - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
      inputs:
        terraformVersion: '1.14.6'

    - task: Bash@3
      inputs:
        targetType: inline
        script: |
          pwd 
          ls -ltr
          python3 -m pip install --upgrade pip
          pip3 install checkov
      displayName: 'Installing Checkov'

    - task: Bash@3
      inputs:
        targetType: inline
        script: |
          checkov -d terraform
      displayName: 'Security Scan'

- stage: Plan
  dependsOn: Validate
  jobs:
  - job: Plan
    steps:

    - checkout: self
      
    - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
      inputs:
        terraformVersion: '1.14.6'

    - task: DownloadSecureFile@1
      name: gcpcred
      inputs:
        secureFile: gcp-wif.json
    
    - bash: |
        echo "Authenticating with service account"

        export GOOGLE_APPLICATION_CREDENTIALS=$(gcpcred.secureFilePath)
       
        gcloud auth activate-service-account \
          --key-file=$GOOGLE_APPLICATION_CREDENTIALS

        echo "Authenticated accounts:"
        gcloud auth list

        echo "Current project:"
        gcloud config set project project-4bdbeb16-1a29-411e-8bd
      displayName: Test GCP Authentication

