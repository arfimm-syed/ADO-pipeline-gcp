

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Validate
  jobs:
  - job: Validate
    steps:
    - checkout: self

    - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
      inputs:
        terraformVersion: '1.14.6'

    - task: Bash@3
      inputs:
        targetType: inline
        script: |
          pwd 
          ls -ltr
          python3 -m pip install --upgrade pip
          pip3 install checkov
      displayName: 'Installing Checkov'

    - task: Bash@3
      inputs:
        targetType: inline
        script: |
          checkov -d terraform
      displayName: 'Security Scan'

- stage: Plan
  dependsOn: Validate
  jobs:
  - job: Plan
    steps:

    - checkout: self
      
    - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
      inputs:
        terraformVersion: '1.14.6'

    - task: DownloadSecureFile@1
      name: gcpcred
      inputs:
        secureFile: gcp-wif.json

    - bash: |
        echo "Getting Azure DevOps OIDC token..."

        OIDC_URL="https://vstoken.dev.azure.com/syedafzalsh/_apis/distributedtask/hubs/build/plans/${SYSTEM_PLANID}/jobs/${SYSTEM_JOBID}/oidctoken?api-version=7.1-preview.1"

        curl -s \
        -H "Authorization: Bearer $SYSTEM_ACCESSTOKEN" \
        $OIDC_URL \
        | jq -r '.oidcToken' > /tmp/oidc-token

        echo "Token saved to /tmp/oidc-token"

        echo "##vso[task.setvariable variable=GOOGLE_APPLICATION_CREDENTIALS]$(gcpcred.secureFilePath)"
 
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
        SYSTEM_PLANID: $(System.PlanId)
        SYSTEM_JOBID: $(System.JobId)

      displayName: Authenticate to GCP


    - task: Bash@3
      displayName: 'Terraform Init Plan'
      inputs:
        targetType: 'inline'
        script: |
         terraform init -reconfigure
         terraform plan -out=tfplan
      env:
         GOOGLE_APPLICATION_CREDENTIALS: $(GOOGLE_APPLICATION_CREDENTIALS)

- stage: Apply
  dependsOn: Plan
  jobs:
    - job: Apply
      steps:

      - checkout: self

      - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
        inputs:
        terraformVersion: '1.14.6'

      # - download: current
      #   artifact: terraform-plan

      - task: DownloadSecureFile@1
        name: gcpcred
        inputs:
         secureFile: gcp-wif.json

      - bash: |
          echo "Setting GOOGLE_APPLICATION_CREDENTIALS"

          echo "##vso[task.setvariable variable=GOOGLE_APPLICATION_CREDENTIALS]$(gcpcred.secureFilePath)"
        displayName: Set GCP Credentials

      # - task: Bash@3
      #   displayName: Terraform Init
      #   inputs:
      #     targetType: inline
      #     script: |
      #       terraform init -reconfigure
      # env:
      #   GOOGLE_APPLICATION_CREDENTIALS: $(GOOGLE_APPLICATION_CREDENTIALS)

      - task: Bash@3
        displayName: Terraform Apply
        inputs:
          targetType: inline
          script: |
            terraform apply -auto-approve terraform-plan/tfplan
      env:
        GOOGLE_APPLICATION_CREDENTIALS: $(GOOGLE_APPLICATION_CREDENTIALS) 